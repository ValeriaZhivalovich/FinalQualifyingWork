version: '3.8'

services:
  perplexity-bot:
    build: .
    container_name: perplexity-bot
    restart: unless-stopped
    ports:
      - "3002:3002"  # API сервер
      - "5900:5900"  # VNC сервер
      - "6080:6080"  # noVNC веб-интерфейс
    environment:
      - NODE_ENV=production
      - DISPLAY=:99
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3002
      - SERVER_MODE=true
      - PYTHONUNBUFFERED=1
      - BOT_TOKEN=${BOT_TOKEN}
      - TELEGRAM_BOT_TOKEN=${BOT_TOKEN}
      - OPENAI_KEY=${OPENAI_KEY}
      - SERVICE_CHAT_ID=${SERVICE_CHAT_ID}
      - PERPLEXITY_API_URL=http://localhost:3002/v1/messages
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
      - ./cookies.json:/app/cookies.json:ro
      - chrome_data:/app/chrome_profile
    networks:
      - perplexity-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  perplexity-network:
    driver: bridge

volumes:
  chrome_data:
    driver: local